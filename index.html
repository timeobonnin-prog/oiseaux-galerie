<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie pro – Stockage illimité (IndexedDB)</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --gold: #c9a050;
            --gold-light: #e0c878;
            --gold-dark: #8b6914;
            --text: #d4d4d4;
            --text-muted: #999;
            --border: #333;
            --radius: 12px;
            --transition: 0.3s;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(201,160,80,0.06) 0%, transparent 60%);
            background-attachment: fixed;
        }
        #main-container { min-height:100vh; padding:30px 20px 60px; }
        .header {
            max-width:1200px; margin:0 auto 30px; display:flex; align-items:center;
            justify-content:space-between; flex-wrap:wrap; gap:20px; padding:20px 28px;
            background:var(--surface); border-radius:var(--radius); border:1px solid var(--border);
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
        }
        .header-title { display:flex; align-items:center; gap:12px; }
        .header-title .icon { font-size:2rem; filter:drop-shadow(0 0 12px rgba(201,160,80,0.5)); }
        .header-title h2 { font-size:1.5rem; font-weight:700; color:var(--gold-light); }
        .header-info { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
        .counter { background:var(--bg); padding:10px 18px; border-radius:50px; font-size:0.9rem; color:var(--text-muted); border:1px solid var(--border); }
        .counter strong { color:var(--gold-light); }
        .btn-upload, .btn-delete-selected, .admin-btn, .sort-btn {
            display:flex; align-items:center; gap:8px; padding:12px 24px; border-radius:50px;
            background:linear-gradient(135deg, var(--gold-dark), var(--gold)); color:#1a1a1a;
            font-weight:700; border:none; cursor:pointer; position:relative; overflow:hidden;
            box-shadow:0 4px 18px rgba(201,160,80,0.3); transition:var(--transition);
        }
        .btn-upload input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
        .btn-upload:hover, .btn-delete-selected:hover, .admin-btn:hover, .sort-btn:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(224,200,120,0.5); }
        .btn-delete-selected { background:transparent; color:#c77; border:1.5px solid #5a2a2a; display:none; }
        .btn-delete-selected.visible { display:inline-flex; }
        .btn-delete-selected:hover { background:#2a1010; border-color:#a33; color:#f88; }
        .admin-btn, .sort-btn { background:transparent; border:1.5px solid var(--gold); color:var(--gold-light); font-weight:600; padding:10px 18px; }
        .sort-btn.active { background:var(--gold); color:#1a1a1a; border-color:var(--gold); }
        .hidden-admin { display:none!important; }
        .drop-zone {
            max-width:1200px; margin:0 auto 30px; padding:50px 30px; text-align:center;
            border:2px dashed #444; border-radius:var(--radius); background:var(--surface);
            cursor:pointer; transition:var(--transition);
        }
        .drop-zone.drag-over { border-color:var(--gold); background:#1e1e1e; box-shadow:0 0 40px rgba(201,160,80,0.15); }
        .drop-icon { font-size:3rem; margin-bottom:12px; }
        .gallery-container { max-width:1200px; margin:0 auto; }
        .gallery-empty { text-align:center; padding:80px 20px; color:#444; }
        .gallery-empty .empty-icon { font-size:5rem; display:block; margin-bottom:16px; opacity:0.4; }
        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:20px; padding:0; }
        .gallery-item {
            position:relative; border-radius:var(--radius); overflow:hidden;
            background:var(--surface2); border:2px solid transparent;
            aspect-ratio:4/3; box-shadow:0 4px 16px rgba(0,0,0,0.4);
            cursor:pointer; transition:var(--transition);
        }
        .gallery-item:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.6),0 0 0 1px var(--gold-dark); border-color:#555; }
        .gallery-item.selected {
            border-color:var(--gold)!important;
            box-shadow:0 0 25px var(--gold-glow),0 0 50px var(--gold-glow),0 0 80px rgba(201,160,80,0.25);
            animation:selectedGlow 2s infinite;
        }
        @keyframes selectedGlow {
            0%,100%{box-shadow:0 0 25px var(--gold-glow),0 0 50px var(--gold-glow),0 0 80px rgba(201,160,80,0.25);}
            50%{box-shadow:0 0 40px rgba(224,200,120,0.9),0 0 70px rgba(224,200,120,0.7),0 0 100px rgba(224,200,120,0.4);}
        }
        .gallery-item.selected::after {
            content:'★'; position:absolute; top:12px; right:14px; font-size:1.4rem;
            color:var(--gold-light); z-index:5;
            filter:drop-shadow(0 0 8px rgba(201,160,80,0.9));
        }
        .gallery-item img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
        .item-remove, .item-zoom {
            position:absolute; z-index:5; width:32px; height:32px; border-radius:50%;
            background:rgba(0,0,0,0.7); border:1px solid #555; color:#ccc;
            display:flex; align-items:center; justify-content:center;
            opacity:0; cursor:pointer; transition:var(--transition);
            pointer-events:auto;
        }
        .item-remove { top:10px; left:12px; }
        .item-zoom { top:10px; right:50px; }
        .gallery-item:hover .item-remove, .gallery-item:hover .item-zoom { opacity:1; }
        .item-remove:hover { background:rgba(180,30,30,0.8); border-color:#b33; color:#fff; }
        .item-zoom:hover { background:rgba(201,160,80,0.3); border-color:var(--gold); color:var(--gold-light); }

        .watermark-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:var(--bg); padding:8px 14px; border-radius:50px;
            font-size:0.8rem; color:var(--gold-light); border:1px solid #3a3020;
        }
        .watermark-badge .dot {
            width:8px; height:8px; border-radius:50%; background:var(--gold);
            animation:pulseDot 1.5s infinite;
        }
        @keyframes pulseDot {
            0%,100%{box-shadow:0 0 6px var(--gold-glow);}
            50%{box-shadow:0 0 16px rgba(224,200,120,0.9);}
        }

        .lightbox {
            position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,0.9);
            display:flex; align-items:center; justify-content:center;
            opacity:0; visibility:hidden; transition:0.3s;
        }
        .lightbox.active { opacity:1; visibility:visible; }
        .lightbox-content {
            position:relative; max-width:90vw; max-height:90vh;
            display:flex; flex-direction:column; align-items:center;
        }
        .lightbox-content img {
            max-width:100%; max-height:80vh; object-fit:contain;
            border:2px solid var(--border); border-radius:8px;
            box-shadow:0 0 40px rgba(201,160,80,0.3);
            user-select: none; -webkit-user-drag: none;
        }
        .lightbox-copyright {
            margin-top:12px; color:var(--text-muted); font-size:0.85rem;
        }
        .lightbox-close {
            position:absolute; top:-15px; right:-15px; width:40px; height:40px;
            border-radius:50%; background:var(--surface); border:1px solid var(--border);
            color:var(--text); font-size:1.4rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:var(--transition);
        }
        .lightbox-close:hover { background:#a33; color:#fff; }

        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.85);
            display:flex; align-items:center; justify-content:center;
            z-index:2000; opacity:0; visibility:hidden; transition:0.3s;
        }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-box {
            background:var(--surface); border:1px solid var(--border);
            border-radius:16px; padding:30px; text-align:center;
            max-width:400px; width:90%;
        }
        .modal-box h3 { color:var(--gold-light); margin-bottom:12px; }
        .modal-box input { padding:10px; border-radius:20px; border:1px solid var(--border); background:var(--bg); color:var(--text); width:80%; text-align:center; margin-bottom:12px; }
        .error { color:#e88; font-size:0.85rem; }
        .btn { padding:14px 28px; border-radius:50px; border:none; cursor:pointer; font-weight:600; }
        .btn-gold { background:linear-gradient(135deg, var(--gold-dark),var(--gold),var(--gold-light)); color:#1a1a1a; }
        @media (max-width:768px) {
            .header { flex-direction:column; text-align:center; }
            .gallery-grid { grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; }
        }
    </style>
</head>
<body>
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Agrandissement">
            <div class="lightbox-copyright" id="lightbox-copyright"></div>
            <button class="lightbox-close" id="lightbox-close">✕</button>
        </div>
    </div>

    <div class="modal-overlay" id="admin-modal">
        <div class="modal-box">
            <h3>🔐 Administration</h3>
            <input type="password" id="admin-password" placeholder="Mot de passe">
            <button class="btn btn-gold" id="btn-admin-login">Valider</button>
            <p class="error" id="admin-error"></p>
        </div>
    </div>

    <div id="main-container">
        <div class="header">
            <div class="header-title"><span class="icon">🖼️</span><h2>Galerie • IndexedDB</h2></div>
            <div class="header-info">
                <span class="watermark-badge"><span class="dot"></span> Protection active</span>
                <span class="counter"><strong id="image-count">0</strong> image<span id="plural">s</span></span>
                <button class="sort-btn active" id="sort-newest">🕒 Plus récent</button>
                <button class="sort-btn" id="sort-oldest">📅 Plus ancien</button>
                <button class="admin-btn" id="btn-open-admin">🔒 Admin</button>
                <button class="btn-upload hidden-admin" id="btn-upload-area">📁 Ajouter<input type="file" id="file-input" accept="image/*" multiple></button>
                <button class="btn-delete-selected hidden-admin" id="btn-delete-selected">🗑️ Retirer sélection</button>
            </div>
        </div>
        <div class="drop-zone hidden-admin" id="drop-zone">
            <span class="drop-icon">📥</span>
            <p><strong>Glissez‑déposez</strong> vos photos ici<br>ou cliquez pour parcourir</p>
        </div>
        <div class="gallery-container">
            <div class="gallery-empty" id="gallery-empty"><span class="empty-icon">📭</span><p>Aucune photo.</p></div>
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nsfwjs@2.4.0/dist/nsfwjs.min.js"></script>
    <script>
        (function(){
            // ---------- CONSTANTES ----------
            const ADMIN_PASSWORD_HASH = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"; // "password"
            const WATERMARK_TEXT = "© Tous droits réservés 2024 – Votre Nom";
            const LIGHT_OPACITY = 0.12, LIGHT_FONT_RATIO = 0.06, LIGHT_SPACING_RATIO = 0.25;
            const HEAVY_OPACITY = 0.75, HEAVY_FONT_RATIO = 0.13, HEAVY_SPACING_RATIO = 0.16;
            const MAX_DIM = 1200; // un peu plus petit pour gagner de la place
            const DB_NAME = "PhotoGalleryDB", STORE_NAME = "images", DB_VERSION = 1;

            let nsfwModel = null;
            let isAdmin = false;
            let currentSort = "newest"; // "newest" ou "oldest"
            let galleryImages = [];      // tableau en mémoire { id, lightURL, heavyURL, timestamp, selected }

            // DOM
            const galleryGrid = document.getElementById('gallery-grid');
            const galleryEmpty = document.getElementById('gallery-empty');
            const imageCountEl = document.getElementById('image-count');
            const pluralEl = document.getElementById('plural');
            const btnDeleteSelected = document.getElementById('btn-delete-selected');
            const fileInput = document.getElementById('file-input');
            const dropZone = document.getElementById('drop-zone');
            const sortNewest = document.getElementById('sort-newest');
            const sortOldest = document.getElementById('sort-oldest');
            const btnOpenAdmin = document.getElementById('btn-open-admin');
            const adminModal = document.getElementById('admin-modal');
            const adminPassword = document.getElementById('admin-password');
            const btnAdminLogin = document.getElementById('btn-admin-login');
            const adminError = document.getElementById('admin-error');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCopyright = document.getElementById('lightbox-copyright');
            const lightboxClose = document.getElementById('lightbox-close');

            let db = null;

            // ---------- INDEXEDDB ----------
            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            const store = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                            store.createIndex("timestamp", "timestamp", { unique: false });
                        }
                    };
                });
            }

            async function loadAllImagesFromDB() {
                if (!db) db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, "readonly");
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => {
                        const items = request.result.map(item => ({
                            id: item.id,
                            lightDataURL: item.lightDataURL,
                            heavyDataURL: item.heavyDataURL,
                            timestamp: item.timestamp,
                            selected: false
                        }));
                        resolve(items);
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            async function saveImageToDB(lightURL, heavyURL, timestamp) {
                if (!db) db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, "readwrite");
                    const store = tx.objectStore(STORE_NAME);
                    const record = { lightDataURL: lightURL, heavyDataURL: heavyURL, timestamp: timestamp };
                    const request = store.add(record);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async function deleteImageFromDB(id) {
                if (!db) db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, "readwrite");
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async function updateImageSelection(id, selected) {
                // la sélection n'est pas persistante (juste en mémoire)
                const img = galleryImages.find(i => i.id === id);
                if (img) img.selected = selected;
                renderGallery();
            }

            // ---------- FILIGRANE ----------
            function applyWatermark(ctx, w, h, opacity, fontRatio, spacingRatio) {
                const fontSize = Math.max(w * fontRatio, 24);
                const spacing = Math.max(w * spacingRatio, fontSize * 2);
                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                ctx.lineWidth = fontSize * 0.1;
                ctx.font = `bold ${fontSize}px "Segoe UI", Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.translate(w/2, h/2);
                ctx.rotate(-30 * Math.PI/180);
                const diag = Math.sqrt(w*w+h*h)*1.6;
                const stepX = ctx.measureText(WATERMARK_TEXT).width + fontSize*1.6;
                for (let y = -diag; y < diag; y += spacing)
                    for (let x = -diag; x < diag; x += stepX) {
                        ctx.strokeText(WATERMARK_TEXT, x, y);
                        ctx.fillText(WATERMARK_TEXT, x, y);
                    }
                ctx.restore();
            }

            function generateWatermarkVersions(imgElement, callback) {
                let w = imgElement.naturalWidth, h = imgElement.naturalHeight;
                const ratio = Math.min(MAX_DIM/w, MAX_DIM/h, 1);
                w = Math.round(w*ratio); h = Math.round(h*ratio);
                const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
                const ctx = canvas.getContext('2d'); ctx.drawImage(imgElement, 0, 0, w, h);
                const heavyCanvas = document.createElement('canvas'); heavyCanvas.width=w; heavyCanvas.height=h;
                const heavyCtx = heavyCanvas.getContext('2d'); heavyCtx.drawImage(canvas, 0, 0);
                applyWatermark(ctx, w, h, LIGHT_OPACITY, LIGHT_FONT_RATIO, LIGHT_SPACING_RATIO);
                applyWatermark(heavyCtx, w, h, HEAVY_OPACITY, HEAVY_FONT_RATIO, HEAVY_SPACING_RATIO);
                const light = canvas.toDataURL('image/jpeg', 0.82);
                const heavy = heavyCanvas.toDataURL('image/jpeg', 0.82);
                callback(light, heavy);
            }

            // ---------- NSFW ----------
            async function loadNSFW() { nsfwModel = await nsfwjs.load(); }
            loadNSFW();
            async function isSafe(file) {
                if (!nsfwModel) return true;
                const img = await createImageBitmap(file);
                const canvas = document.createElement('canvas'); canvas.width=img.width; canvas.height=img.height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0);
                const pred = await nsfwModel.classify(canvas);
                const forbidden = ['Porn','Hentai','Sexy'];
                return !pred.some(p => forbidden.includes(p.className) && p.probability > 0.5);
            }

            // ---------- AJOUT D'IMAGE ----------
            async function addImageFromFile(file) {
                if (!file.type.startsWith('image/')) return;
                if (!await isSafe(file)) { alert("⛔ Image refusée (contenu inapproprié)"); return; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        generateWatermarkVersions(tempImg, async (lightURL, heavyURL) => {
                            const newId = await saveImageToDB(lightURL, heavyURL, Date.now());
                            galleryImages.unshift({ id: newId, lightDataURL: lightURL, heavyDataURL: heavyURL, timestamp: Date.now(), selected: false });
                            sortImages(); renderGallery();
                        });
                    };
                    tempImg.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            async function handleFiles(files) {
                for(let f of files) await addImageFromFile(f);
                fileInput.value = '';
            }

            // ---------- TRI ----------
            function sortImages() {
                if (currentSort === 'newest') galleryImages.sort((a,b) => b.timestamp - a.timestamp);
                else galleryImages.sort((a,b) => a.timestamp - b.timestamp);
            }
            function setSort(order) {
                if (currentSort === order) return;
                currentSort = order;
                sortNewest.classList.toggle('active', order === 'newest');
                sortOldest.classList.toggle('active', order === 'oldest');
                sortImages();
                renderGallery();
            }

            // ---------- RENDU ----------
            let heavyTimeouts = {};
            function activateHeavy(id, imgEl) {
                const img = galleryImages.find(i => i.id === id);
                if (!img) return;
                imgEl.src = img.heavyDataURL;
                heavyTimeouts[id] = setTimeout(() => restoreLight(id, imgEl), 3000);
            }
            function restoreLight(id, imgEl) {
                const img = galleryImages.find(i => i.id === id);
                if (!img) return;
                imgEl.src = img.lightDataURL;
                clearTimeout(heavyTimeouts[id]);
                delete heavyTimeouts[id];
            }

            function openLightbox(imgObj) {
                lightboxImg.src = imgObj.lightDataURL;
                lightboxCopyright.textContent = `${WATERMARK_TEXT} – Agrandissement protégé`;
                lightbox.classList.add('active');
            }
            lightboxClose.onclick = () => lightbox.classList.remove('active');
            lightbox.addEventListener('click', (e) => { if(e.target === lightbox) lightbox.classList.remove('active'); });

            function toggleSelection(id) {
                const img = galleryImages.find(i => i.id === id);
                if (img) { img.selected = !img.selected; renderGallery(); }
            }
            async function removeImage(id) {
                if (!isAdmin) return;
                await deleteImageFromDB(id);
                galleryImages = galleryImages.filter(i => i.id !== id);
                renderGallery();
            }
            async function removeSelected() {
                if (!isAdmin) return;
                const idsToDelete = galleryImages.filter(i => i.selected).map(i => i.id);
                for(let id of idsToDelete) await deleteImageFromDB(id);
                galleryImages = galleryImages.filter(i => !i.selected);
                renderGallery();
            }

            function renderGallery() {
                sortImages();
                galleryGrid.innerHTML = '';
                const count = galleryImages.length;
                galleryEmpty.style.display = count ? 'none' : 'block';
                galleryGrid.style.display = count ? 'grid' : 'none';
                for(let img of galleryImages) {
                    const item = document.createElement('div');
                    item.className = 'gallery-item' + (img.selected ? ' selected' : '');
                    item.dataset.id = img.id;
                    const imageElem = document.createElement('img');
                    imageElem.src = img.lightDataURL;
                    imageElem.draggable = false;
                    imageElem.addEventListener('contextmenu', (e) => { e.preventDefault(); activateHeavy(img.id, imageElem); setTimeout(() => { const ev = new MouseEvent('contextmenu', {bubbles:true, clientX:e.clientX, clientY:e.clientY}); imageElem.dispatchEvent(ev); }, 10); });
                    imageElem.addEventListener('dragstart', () => activateHeavy(img.id, imageElem));
                    imageElem.addEventListener('dragend', () => restoreLight(img.id, imageElem));
                    const zoomBtn = document.createElement('button'); zoomBtn.className='item-zoom'; zoomBtn.innerHTML='🔍';
                    zoomBtn.onclick = (e) => { e.stopPropagation(); openLightbox(img); };
                    const delBtn = document.createElement('button'); delBtn.className='item-remove' + (!isAdmin ? ' hidden-admin' : ''); delBtn.innerHTML='✕';
                    delBtn.onclick = (e) => { e.stopPropagation(); removeImage(img.id); };
                    item.appendChild(imageElem); item.appendChild(zoomBtn); item.appendChild(delBtn);
                    item.addEventListener('click', (e) => { if(e.target === delBtn || e.target === zoomBtn) return; toggleSelection(img.id); });
                    galleryGrid.appendChild(item);
                }
                imageCountEl.textContent = count;
                pluralEl.textContent = count === 1 ? '' : 's';
                const sel = galleryImages.filter(i => i.selected).length;
                btnDeleteSelected.classList.toggle('visible', sel > 0 && isAdmin);
                btnDeleteSelected.textContent = sel ? `🗑️ Retirer (${sel})` : '';
            }

            // ---------- ADMIN ----------
            async function checkAdmin(password) {
                const hash = await sha256(password);
                return hash === ADMIN_PASSWORD_HASH;
            }
            async function sha256(msg) {
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
                return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
            }
            function setAdminMode(admin) {
                isAdmin = admin;
                document.querySelectorAll('.hidden-admin').forEach(el => el.classList.toggle('hidden-admin', !admin));
                renderGallery();
            }
            btnOpenAdmin.onclick = () => adminModal.classList.add('active');
            btnAdminLogin.onclick = async () => {
                const pwd = adminPassword.value;
                if (await checkAdmin(pwd)) {
                    setAdminMode(true);
                    adminModal.classList.remove('active');
                    adminError.textContent = '';
                } else adminError.textContent = 'Mot de passe incorrect';
            };
            // fermeture modal au clic extérieur
            adminModal.onclick = (e) => { if(e.target === adminModal) adminModal.classList.remove('active'); };

            // ---------- DRAG & UPLOAD ----------
            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', async (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')); if(files.length) await handleFiles(files); });
            fileInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));

            // ---------- INIT ----------
            async function init() {
                db = await openDB();
                const imagesFromDB = await loadAllImagesFromDB();
                galleryImages = imagesFromDB;
                sortImages();
                renderGallery();
                setSort('newest');
                sortNewest.addEventListener('click', () => setSort('newest'));
                sortOldest.addEventListener('click', () => setSort('oldest'));
                btnDeleteSelected.addEventListener('click', () => removeSelected());
                setAdminMode(false);
            }
            init();
        })();
    </script>
</body>
</html>
